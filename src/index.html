    <!-- ===== Google Translate (hidden native widget) ===== -->
    <script type="text/javascript">
      /* ─────────────────────────────────────────────
         STEP 0 – If a non-English language is saved,
         hide the body IMMEDIATELY so no English flash
      ───────────────────────────────────────────── */
      (function () {
        var saved = localStorage.getItem("uf_lang");
        if (saved && saved !== "en") {
          document.documentElement.style.visibility = "hidden";
          /* Safety net: always show after 4s even if GT fails */
          setTimeout(function () {
            document.documentElement.style.visibility = "";
          }, 4000);
        }
      })();

      /* ── Language list ── */
      var LANGS = [
        { code: "en", label: "English", flag: "🇬🇧" },
        { code: "hi", label: "हिन्दी", flag: "�" },
        { code: "ar", label: "العربية", flag: "🇸�" },
        { code: "fr", label: "Français", flag: "🇫🇷" },
        { code: "es", label: "Español", flag: "��" },
        { code: "de", label: "Deutsch", flag: "��" },
        { code: "zh", label: "中文", flag: "��" },
        { code: "ja", label: "日本語", flag: "🇯🇵" },
        { code: "pt", label: "Português", flag: "🇧🇷" },
        { code: "ru", label: "Русский", flag: "🇷🇺" },
      ];

      var RTL_LANGS = ["ar", "he", "fa", "ur"];

      /* ── RTL: watch <html lang> attribute ── */
      new MutationObserver(function () {
        var lang = (document.documentElement.getAttribute("lang") || "en")
          .split("-")[0]
          .toLowerCase();
        document.documentElement.setAttribute(
          "dir",
          RTL_LANGS.indexOf(lang) !== -1 ? "rtl" : "ltr",
        );
      }).observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["lang"],
      });

      /* ── Kill Google top bar ── */
      function killGoogleBar() {
        document
          .querySelectorAll(".goog-te-banner-frame, iframe.skiptranslate")
          .forEach(function (f) {
            f.style.cssText = "display:none!important;height:0!important;";
          });
        document.body.style.top = "0";
        document.body.style.marginTop = "0";
        document.body.style.position = "static";
      }

      /* ── Reveal page (called once translation is done) ── */
      function revealPage() {
        document.documentElement.style.visibility = "";
      }

      /* ── Watch DOM mutations to detect when Google finishes translating ── */
      function watchForTranslationComplete(cb) {
        var settled = false;
        var timer = null;

        var obs = new MutationObserver(function () {
          /* Every time GT touches the DOM, restart a 600ms quiet-timer.
             When DOM stops changing → translation is done. */
          clearTimeout(timer);
          timer = setTimeout(function () {
            if (!settled) {
              settled = true;
              obs.disconnect();
              cb();
            }
          }, 600);
        });

        obs.observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true,
        });

        /* Fallback: if no mutations in 3s, reveal anyway */
        setTimeout(function () {
          if (!settled) {
            settled = true;
            obs.disconnect();
            cb();
          }
        }, 3000);
      }

      /* ── Country to Language Mapping ── */
      var COUNTRY_LANG_MAP = {
        IN: "hi", // India → Hindi
        SA: "ar", // Saudi Arabia → Arabic
        AE: "ar", // UAE → Arabic
        EG: "ar", // Egypt → Arabic
        DZ: "ar", // Algeria → Arabic
        JO: "ar", // Jordan → Arabic
        IQ: "ar", // Iraq → Arabic
        KW: "ar", // Kuwait → Arabic
        LB: "ar", // Lebanon → Arabic
        LY: "ar", // Libya → Arabic
        OM: "ar", // Oman → Arabic
        QA: "ar", // Qatar → Arabic
        SD: "ar", // Sudan → Arabic
        SY: "ar", // Syria → Arabic
        TN: "ar", // Tunisia → Arabic
        YE: "ar", // Yemen → Arabic
        FR: "fr", // France → French
        BE: "fr", // Belgium → French
        CH: "fr", // Switzerland → French
        CA: "fr", // Canada → French
        CI: "fr", // Ivory Coast → French
        CM: "fr", // Cameroon → French
        GA: "fr", // Gabon → French
        HT: "fr", // Haiti → French
        ML: "fr", // Mali → French
        SN: "fr", // Senegal → French
        ES: "es", // Spain → Spanish
        MX: "es", // Mexico → Spanish
        AR: "es", // Argentina → Spanish
        CL: "es", // Chile → Spanish
        CO: "es", // Colombia → Spanish
        PE: "es", // Peru → Spanish
        VE: "es", // Venezuela → Spanish
        BO: "es", // Bolivia → Spanish
        EC: "es", // Ecuador → Spanish
        PY: "es", // Paraguay → Spanish
        UY: "es", // Uruguay → Spanish
        DE: "de", // Germany → German
        AT: "de", // Austria → German
        LI: "de", // Liechtenstein → German
        LU: "de", // Luxembourg → German
        CN: "zh", // China → Chinese
        TW: "zh", // Taiwan → Chinese
        HK: "zh", // Hong Kong → Chinese
        MO: "zh", // Macau → Chinese
        JP: "ja", // Japan → Japanese
        BR: "pt", // Brazil → Portuguese
        PT: "pt", // Portugal → Portuguese
        AO: "pt", // Angola → Portuguese
        MZ: "pt", // Mozambique → Portuguese
        RU: "ru", // Russia → Russian
        BY: "ru", // Belarus → Russian
        KZ: "ru", // Kazakhstan → Russian
        UA: "ru", // Ukraine → Russian
      };

      /* ── Auto-detect user's country and set language ── */
      function autoDetectLanguageByCountry() {
        // ❗ If user manually selected a language before → skip auto-detection
        if (localStorage.getItem("uf_lang_manual")) {
          return;
        }

        // Check if we already tried auto-detection in this session
        if (sessionStorage.getItem("uf_auto_detected")) {
          return;
        }

        fetch("https://ipapi.co/json/")
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            sessionStorage.setItem("uf_auto_detected", "true");

            var country = data.country || "";
            var detectedLang = COUNTRY_LANG_MAP[country] || "en";

            // Save auto-detected language
            localStorage.setItem("uf_lang", detectedLang);

            // Set cookie for Google Translate AND reload to apply
            if (detectedLang !== "en") {
              // Always set the cookie for all languages (including Hindi, Chinese, etc)
              var cv = "/en/" + detectedLang;
              document.cookie = "googtrans=" + cv + "; path=/;";
              document.cookie = "googtrans=" + cv + "; path=/; domain=" + location.hostname + ";";
              document.cookie = "googtrans=" + cv + "; path=/; domain=." + location.hostname + ";";

              // Hide page while translation happens
              document.documentElement.style.visibility = "hidden";
              location.reload();
            }
          })
          .catch(function (err) {
            console.log("Country detection failed:", err);
            sessionStorage.setItem("uf_auto_detected", "true");
          });
      }

      /* ── Detect manual language selection ── */
      function detectManualLanguageChange() {
        document.addEventListener("click", function () {
          var frame = document.querySelector(".goog-te-menu-frame");
          if (frame && frame.contentWindow) {
            try {
              frame.contentWindow.document.body.addEventListener(
                "click",
                function () {
                  // User manually selected a language
                  localStorage.setItem("uf_lang_manual", "true");
                },
              );
            } catch (e) {
              // Cross-origin frame access denied (normal)
            }
          }
        });
      }

      /* ── Google Translate init callback ── */
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,hi,ar,fr,es,de,zh,ja,pt,ru",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
            multilanguagePage: true,
          },
          "google_translate_element",
        );

        killGoogleBar();
        setInterval(killGoogleBar, 800);

        // Start detecting manual changes
        detectManualLanguageChange();

        /* Restore saved language */
        var saved = localStorage.getItem("uf_lang");
        if (saved && saved !== "en") {
          waitForSelectThenTranslate(saved, 60);
        } else {
          /* English → just show immediately */
          revealPage();
        }
      }

      /* ── Wait for GT <select> then translate ── */
      function waitForSelectThenTranslate(langCode, maxTries) {
        var tries = 0;
        var iv = setInterval(function () {
          var sel = document.querySelector(
            "#google_translate_element select.goog-te-combo",
          );
          if (sel) {
            clearInterval(iv);
            /* Watch DOM → reveal AFTER GT finishes translating */
            watchForTranslationComplete(revealPage);
            doTranslate(sel, langCode);
          } else if (++tries >= maxTries) {
            clearInterval(iv);
            revealPage(); /* GT failed to load → show page anyway */
          }
        }, 150);
      }

      /* ── Fire translation ── */
      function doTranslate(sel, langCode) {
        /* Always clear old cookie first */
        document.cookie =
          "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        document.cookie =
          "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" +
          location.hostname +
          ";";
        document.cookie =
          "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." +
          location.hostname +
          ";";

        localStorage.setItem("uf_lang", langCode);
        updateBtnLabel(langCode);

        if (langCode === "en") {
          /* Reset to English: reload without cookie */
          location.reload();
          return;
        }

        /* Set fresh cookie for new language */
        var cv = "/en/" + langCode;
        document.cookie = "googtrans=" + cv + "; path=/;";
        document.cookie =
          "googtrans=" + cv + "; path=/; domain=" + location.hostname + ";";
        document.cookie =
          "googtrans=" + cv + "; path=/; domain=." + location.hostname + ";";

        /* Reset select to English first, then dispatch the new lang.
           This forces Google Translate to re-trigger even if it was
           already on a translated state. */
        sel.value = "en";
        sel.dispatchEvent(new Event("change", { bubbles: true }));

        setTimeout(function () {
          sel.value = langCode;
          sel.dispatchEvent(new Event("change", { bubbles: true }));
        }, 50);
      }

      function updateBtnLabel(langCode) {
        var found = null;
        for (var i = 0; i < LANGS.length; i++) {
          if (LANGS[i].code === langCode) {
            found = LANGS[i];
            break;
          }
        }
        if (!found) found = LANGS[0];
        var btn = document.getElementById("uf-lang-btn");
        if (btn)
          btn.innerHTML =
            found.flag +
            " <span>" +
            found.label +
            "</span> <i class='uf-arrow'>▾</i>";
        document.querySelectorAll(".uf-lang-item").forEach(function (el) {
          el.classList.toggle("uf-active", el.dataset.code === langCode);
        });
      }

      function closeDropdown() {
        var menu = document.getElementById("uf-lang-menu");
        var btn = document.getElementById("uf-lang-btn");
        if (menu) menu.classList.remove("open");
        if (btn) btn.classList.remove("active");
      }

      /* ── Build custom dropdown ── */
      function buildCustomDropdown() {
        var wrap = document.getElementById("uf-lang-custom");
        if (!wrap || wrap.dataset.built === "1") return;
        wrap.dataset.built = "1";

        var saved = localStorage.getItem("uf_lang") || "en";
        var current =
          LANGS.filter(function (l) {
            return l.code === saved;
          })[0] || LANGS[0];

        var btn = document.createElement("button");
        btn.id = "uf-lang-btn";
        btn.className = "uf-lang-btn notranslate";
        btn.type = "button";
        btn.innerHTML =
          current.flag +
          " <span>" +
          current.label +
          "</span> <i class='uf-arrow'>▾</i>";

        var menu = document.createElement("ul");
        menu.id = "uf-lang-menu";
        menu.className = "uf-lang-menu notranslate";

        LANGS.forEach(function (lang) {
          var li = document.createElement("li");
          li.className =
            "uf-lang-item notranslate" +
            (lang.code === saved ? " uf-active" : "");
          li.dataset.code = lang.code;
          li.innerHTML =
            "<span class='uf-flag'>" +
            lang.flag +
            "</span><span class='uf-lname'>" +
            lang.label +
            "</span>";

          li.addEventListener("click", function (e) {
            e.stopPropagation();
            closeDropdown();

            var currentLang = localStorage.getItem("uf_lang") || "en";
            if (lang.code === currentLang) return; /* same lang, do nothing */

            /* Save selection immediately */
            localStorage.setItem("uf_lang", lang.code);

            /* Clear ALL old googtrans cookies */
            document.cookie =
              "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            document.cookie =
              "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" +
              location.hostname +
              ";";
            document.cookie =
              "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." +
              location.hostname +
              ";";

            /* Set fresh cookie for new language */
            if (lang.code !== "en") {
              var cv = "/en/" + lang.code;
              document.cookie = "googtrans=" + cv + "; path=/;";
              document.cookie =
                "googtrans=" +
                cv +
                "; path=/; domain=" +
                location.hostname +
                ";";
              document.cookie =
                "googtrans=" +
                cv +
                "; path=/; domain=." +
                location.hostname +
                ";";
            }

            /* Hide page to prevent flash, then reload */
            document.documentElement.style.visibility = "hidden";
            location.reload();
          });
          menu.appendChild(li);
        });

        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          var isOpen = menu.classList.contains("open");
          menu.classList.toggle("open", !isOpen);
          btn.classList.toggle("active", !isOpen);
        });

        document.addEventListener("click", function () {
          closeDropdown();
        });

        wrap.appendChild(btn);
        wrap.appendChild(menu);
      }

      /* ── Auto-detect language on first visit ── */
      autoDetectLanguageByCountry();

      /* ── Poll for #uf-lang-custom (Angular renders it async) ── */
      var _bTries = 0;
      var _bIv = setInterval(function () {
        if (document.getElementById("uf-lang-custom")) {
          clearInterval(_bIv);
          buildCustomDropdown();
        } else if (++_bTries > 80) {
          clearInterval(_bIv);
        }
      }, 100);
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const walk = document.createTreeWalker(
          document.body,
          NodeFilter.SHOW_TEXT,
        );

        let node;
        while ((node = walk.nextNode())) {
          node.nodeValue = node.nodeValue.replace(/upforex/gi, "UPFOREX");
        }
      });
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <!-- ===== End Google Translate ===== -->
