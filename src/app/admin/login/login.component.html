<div
  class="login-container container-fluid d-flex align-items-center justify-content-center"
>
  <div class="login-box p-4 p-sm-5 col-11 col-sm-8 col-md-6 col-lg-4">
    <div class="row justify-content-center">
      <img
        src="../../../assets/images/updated-logos/logo-2.webp"
        class="img !tw-object-contain"
      />
    </div>
    <h1 class="login-title text-center mb-4">Login</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter your email"
        />
        <div
          class="error-message"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
        >
          Email is required
        </div>
        <div
          class="error-message"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
        >
          Please enter a valid email
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter your password"
        />
        <div
          class="error-message"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
        >
          Password is required
        </div>
        <div
          class="error-message"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']"
        >
          Password must be at least 6 characters
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-login btn-lg"
        [disabled]="loginForm.invalid || isSubmitting"
      >
        {{ isSubmitting ? "Logging in..." : "Login" }}
      </button>
    </form>
  </div>
</div>
