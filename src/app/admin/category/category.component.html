<app-data-table
  [columns]="columns"
  [data]="data"
  (actionEmitter)="tableActions($event)"
  [collectionSize]="totalPageSize"
  [pageNum]="pageNum"
  [pageLimit]="pageLimit"
  (pageChangeEmitter)="handlePageChange($event)"
  (pageSizeChangeEmitter)="handlePageSizeChange($event)"
  (addActionEmitter)="createCategory()"
  (searchEmitter)="handleSearch($event)"
  [buttonTitle]="'Add Category'"
  [isLoading]="isLoading"
></app-data-table>

<ng-template #categoryModal let-modal>
  <div
    class="tw-relative tw-bg-white tw-rounded-lg tw-shadow-xl tw-p-8 tw-max-w-lg tw-mx-auto"
  >
    <!-- Close button -->
    <button
      tabindex="-1"
      type="button"
      class="tw-absolute tw-right-2 tw-top-4 tw-text-gray-600 hover:tw-text-gray-900"
      (click)="modal.dismiss()"
    >
      <svg
        class="tw-w-6 tw-h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        ></path>
      </svg>
    </button>

    <div class="tw-text-center tw-mb-8">
      <p class="tw-font-bold tw-text-3xl tw-text-themePrimary">
        {{ isUpdate ? "Update" : "Create" }} Category
      </p>
    </div>

    <div>
      <form (ngSubmit)="handleAddUpdateCategory()">
        <div class="tw-mb-6">
          <label class="tw-block tw-text-sm tw-font-medium tw-text-gray-700"
            >Category Name</label
          >
          <input
            type="text"
            class="tw-shadow-md tw-focus:tw-ring-2 tw-focus:tw-ring-blue-500 tw-block tw-w-full tw-sm:tw-text-sm tw-border-gray-300 tw-rounded-lg tw-p-3 tw-mt-2"
            placeholder="Enter Name"
            [formControl]="categoryName"
          />
          <div
            *ngIf="categoryName.invalid && categoryName.touched"
            class="tw-text-red-500 tw-text-xs tw-mt-1"
          >
            Category Name is required
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary tw-w-full"
          [class.tw-cursor-not-allowed]="categoryName.invalid"
          [disabled]="categoryName.invalid || isWorking"
        >
          {{ isUpdate ? "Update" : "Create" }} Category
          <ng-container *ngIf="isWorking">
            <div
              class="spinner-border tw-text-white"
              role="status"
              style="width: 1rem; height: 1rem"
            ></div>
          </ng-container>
        </button>
      </form>
    </div>
  </div>
</ng-template>

<ng-template #deleteConfirmation let-modal>
  <div class="modal-body tw-p-7">
    <button
      tabindex="-1"
      class="btn-close tw-absolute !tw-right-2 !tw-top-2"
      type="button"
      (click)="modal.dismiss()"
    ></button>
    <h2 class="tw-font-medium tw-text-sm mb-2">
      Do you want to delete this category?
    </h2>

    <div class="tw-mt-10 tw-flex tw-flex-row-reverse tw-gap-2">
      <button
        class="btn btn-sm btn-danger"
        [disabled]="isWorking"
        (click)="handleCategoryDelete()"
      >
        Yes
        <ng-container *ngIf="isWorking">
          <div
            class="spinner-border tw-text-white"
            role="status"
            style="width: 1rem; height: 1rem"
          ></div>
        </ng-container>
      </button>
      <button
        class="btn btn-sm btn-light"
        [disabled]="isWorking"
        (click)="modal.dismiss()"
      >
        No
      </button>
    </div>
  </div>
</ng-template>
