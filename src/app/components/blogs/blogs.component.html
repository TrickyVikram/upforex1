<div class="container py-5 text-white" *ngIf="blog && !isLoading">
  <div class="row g-4">
    <!-- Blog Content -->
    <div class="col-lg-8 col-xl-8 col-md-8 col-12">
      <div class="blog-content">
        <img
          [src]="s3URL + blog.imageUrl"
          class="img-fluid rounded blog-img mb-4 blogImage"
          [alt]="blog.imageAltTag"
        />
        <h1 class="display-5 fw-bold">{{ blog.title }}</h1>
        <p class="fst-italic">
          {{ blog.metaTitle }}
        </p>

        <div class="my-4" *ngIf="blog.videoUrl">
          <video autoplay class="w-100 rounded blogVideo" [muted]="'muted'">
            <source [src]="s3URL + blog.videoUrl" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>

        <p class="lead">
          {{ blog.description }}
        </p>

        <div class="mt-4" [innerHTML]="blog.content"></div>

        <div class="mt-4">
          <span
            class="badge bg-light me-1 my-1 p-3 text-dark"
            *ngFor="let item of blog.tags"
            >{{ item | uppercase }}</span
          >
        </div>
      </div>
    </div>

    <!-- Recommended Blogs -->
    <div class="col-lg-4 col-xl-4 col-md-4 col-12">
      <div class="sidebar">
        <h5 class="mb-4">Recommended Blogs</h5>
        <ul class="list-unstyled">
          <li class="mb-3" *ngFor="let blogs of recommendedBlogs">
            <a
              [routerLink]="['/blogs/', blogs.permaLink]"
              class="text-decoration-none fw-semibold tw-text-themePrimary"
              >{{ blogs.title }} <ng-icon name="matOpenInNew"></ng-icon
            ></a>
            <p class="small mb-0">
              {{ blogs.description.slice(0, 200)
              }}{{ blogs.description.length > 200 ? "..." : "" }}
            </p>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
<div
  class="tw-flex tw-w-full tw-justify-center tw-items-center tw-mt-8 tw-h-[60vh]"
  *ngIf="isLoading"
>
  <div
    class="spinner-border tw-text-white"
    role="status"
    style="width: 3rem; height: 3rem"
  ></div>
</div>
