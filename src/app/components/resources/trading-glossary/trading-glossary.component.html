<div class="container tw-font-montserrat">
  <h1
    class="text-white tw-text-2xl md:tw-text-2xl lg:tw-text-4xl tw-font-bold md:tw-my-4 !tw-mb-8"
  >
    Trading Glossary
</h1>
  <div class="table-responsive">
    <table class="table table-dark table-hover">
      <thead>
        <tr>
          <th class="tw-text-themePrimary">Term</th>
          <th class="tw-text-themePrimary">Definition</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of forexTerms">
          <td>{{ item.term }}</td>
          <td>{{ item.description }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
