<section class="up-container" aria-labelledby="docs-title">
  <h2 id="docs-title" class="text-white tw-text-2xl md:tw-text-2xl lg:tw-text-4xl tw-font-bold md:tw-my-4">All Documents</h2>

  <div class="up-grid">
    <article
      class="up-card"
      *ngFor="let doc of docs"
      [attr.data-doc]="doc.slug"
      itemscope
      itemtype="https://schema.org/CreativeWork"
    >
      <h3 itemprop="name" class="muted">{{ doc.name }}</h3>
      <p class="muted" itemprop="about">{{ doc.about }}</p>

      <div class="row justify">
        <div class="row" role="group" aria-label="actions">
          <a class="btn"
             [href]="doc.viewUrl"
             target="_blank"
             rel="noopener"
             [attr.aria-label]="'View ' + doc.name + ' PDF'"
             (click)="onView(doc)">
            <span class="icon" aria-hidden="true"></span> View PDF
          </a>
        
        </div>
      </div>
    </article>
  </div>
</section>
