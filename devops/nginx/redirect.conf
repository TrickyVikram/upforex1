# HTTP (non-www) → HTTPS + www
server {
    listen 80;
    server_name upforex.com;
    return 301 https://www.upforex.com$request_uri;
}

# HTTPS (non-www) → HTTPS + www
server {
    listen 443 ssl;
    server_name upforex.com;

    ssl_certificate     /etc/letsencrypt/live/www.upforex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.upforex.com/privkey.pem;

    return 301 https://www.upforex.com$request_uri;
}
